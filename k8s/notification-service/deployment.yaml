apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: orderflow
  labels:
    app: notification-service
    project: orderflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        project: orderflow
    spec:
      containers:
        - name: notification-service
          image: ACCOUNT_ID.dkr.ecr.eu-central-1.amazonaws.com/orderflow/notification-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: orderflow-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"