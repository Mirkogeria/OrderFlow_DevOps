# TODO: ServiceMonitor configuration
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: genai-service-monitor
  namespace: orderflow
  labels:
    app: genai-service
    prometheus: orderflow
spec:
  selector:
    matchLabels:
      app: genai-service
  endpoints:
    - port: http
      interval: 30s
      path: /metrics
      scheme: http