apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: orderflow
  labels:
    app: inventory-service
    project: orderflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
        project: orderflow
    spec:
      containers:
        - name: inventory-service
          image: ACCOUNT_ID.dkr.ecr.eu-central-1.amazonaws.com/orderflow/inventory-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: orderflow-config
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: orderflow-secrets
                  key: db_host
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orderflow-secrets
                  key: db_password
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"