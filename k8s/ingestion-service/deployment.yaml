apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: orderflow
  labels:
    app: ingestion-service
    project: orderflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
        project: orderflow
    spec:
      containers:
        - name: ingestion-service
          image: ACCOUNT_ID.dkr.ecr.eu-central-1.amazonaws.com/orderflow/ingestion-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: orderflow-config
          env:
            - name: QDRANT_HOST
              valueFrom:
                secretKeyRef:
                  name: orderflow-secrets
                  key: qdrant_host
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: orderflow-secrets
                  key: aws_access_key_id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: orderflow-secrets
                  key: aws_secret_access_key
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"