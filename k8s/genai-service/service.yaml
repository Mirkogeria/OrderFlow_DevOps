apiVersion: v1
kind: Service
metadata:
  name: genai-service
  namespace: orderflow
  labels:
    app: genai-service
spec:
  selector:
    app: genai-service
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
    - name: stream
      protocol: TCP
      port: 8080
      targetPort: 8000
  type: ClusterIP